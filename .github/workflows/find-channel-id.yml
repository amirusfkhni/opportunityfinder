name: find-channel-id

# Run this workflow manually from the Actions tab after you've posted
# a message in the channel. The channel's numeric ID will appear in the logs.
on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover chat ID
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python get_channel_id.py
