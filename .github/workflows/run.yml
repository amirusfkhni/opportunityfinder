name: opportunity-finder

on:
  schedule:
    # Runs every 3 hours. Cron is UTC.
    - cron: "17 */3 * * *"
  workflow_dispatch:   # allows manual "Run workflow" button in GitHub UI

permissions:
  contents: write   # needed so the workflow can commit the updated SQLite DB back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: opportunity-finder
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated database
        run: |
          git config user.name  "opportunity-bot"
          git config user.email "opportunity-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/opportunities.db)" ]; then
            git add data/opportunities.db
            git commit -m "update dedup DB [skip ci]"
            git push
          else
            echo "No DB changes to commit."
          fi
